<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hero Wars Snapshot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>Hero Wars Snapshot</h1>
    <p id="site-message">Checking the current tab…</p>
    <button id="capture" type="button">Refresh &amp; Capture</button>
    <button id="open" class="secondary" type="button">Open Latest Snapshot</button>
    <button id="support" class="support" type="button">Support for $1</button>
    <p id="status" role="status"></p>
    <p class="privacy">The extension is completely free. Support is optional and opens Buy Me a Coffee in a new tab.</p>
    <p class="privacy">Your snapshot stays in this browser. The extension observes only the account-data calls it recognizes and never stores credentials.</p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
